<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tmcn.us - Apps</title>
    <script>
        if (!sessionStorage.getItem('magic')) {
            window.location.replace('/');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            position: relative;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(20, 60, 120, 0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 40, 180, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(0, 180, 220, 0.3) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a1a 0%, #0d1b2a 40%, #1b1040 100%);
        }

        header {
            padding: 2.5rem 2rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, #e0e0ff 0%, #a0c4ff 50%, #c0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: rgba(180, 200, 255, 0.6);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        .app-card {
            background: linear-gradient(170deg, rgba(30, 20, 70, 0.8), rgba(15, 15, 40, 0.9));
            border: 1px solid rgba(160, 120, 255, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .app-card:hover {
            transform: translateY(-4px);
            border-color: rgba(160, 120, 255, 0.5);
            box-shadow: 0 8px 40px rgba(120, 80, 220, 0.25);
        }

        .app-card-img {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            border-bottom: 1px solid rgba(160, 120, 255, 0.15);
        }

        .app-card-body {
            padding: 1.2rem 1.4rem;
        }

        .app-card-body h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: rgba(220, 200, 255, 0.95);
        }

        .app-card-body p {
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.5;
            color: rgba(180, 200, 255, 0.6);
        }

        .back-link {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.85rem;
            color: rgba(180, 200, 255, 0.4);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: rgba(200, 180, 255, 0.8);
        }

        /* Preview placeholder for Memory Game */
        .memory-preview {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 20px;
            align-content: center;
        }

        .preview-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #16213e, #0f3460);
            border: 1px solid rgba(15, 52, 96, 0.8);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #e94560;
        }
    </style>
</head>
<body>
    <header>
        <h1>apps</h1>
        <p>a collection of things I've built</p>
    </header>

    <div class="apps-grid">
        <a class="app-card" href="/MemoryGame/">
            <div class="memory-preview">
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
                <div class="preview-card">?</div>
            </div>
            <div class="app-card-body">
                <h2>Memory Game</h2>
                <p>A card-flipping memory game with multiple themes, board sizes, and a celebratory donkey surprise when you match pairs. Can you achieve Full Donkey?</p>
            </div>
        </a>
    </div>

    <a class="back-link" href="/">&larr; back to tmcn.us</a>
</body>
</html>
