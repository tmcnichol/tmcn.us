<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tmcn.us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(20, 60, 120, 0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 40, 180, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(0, 180, 220, 0.3) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a1a 0%, #0d1b2a 40%, #1b1040 100%);
            z-index: 0;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .stars canvas {
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #e0e0ff 0%, #a0c4ff 50%, #c0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: rgba(180, 200, 255, 0.7);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(5, 5, 20, 0.85);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: radial-gradient(ellipse at 50% 0%, rgba(100, 60, 200, 0.3), transparent 70%),
                        linear-gradient(170deg, #1a1040, #0d0d2b);
            border: 1px solid rgba(160, 120, 255, 0.3);
            border-radius: 20px;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 60px rgba(120, 80, 220, 0.3), 0 0 120px rgba(80, 40, 180, 0.15);
            animation: modalIn 0.4s ease-out;
        }

        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-sparkles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 20px;
            pointer-events: none;
        }

        .modal-sparkles span {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(200, 180, 255, 0.8);
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        .modal-sparkles span:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .modal-sparkles span:nth-child(2) { left: 85%; top: 15%; animation-delay: 0.5s; }
        .modal-sparkles span:nth-child(3) { left: 20%; top: 75%; animation-delay: 1s; }
        .modal-sparkles span:nth-child(4) { left: 75%; top: 80%; animation-delay: 1.5s; }
        .modal-sparkles span:nth-child(5) { left: 50%; top: 10%; animation-delay: 0.8s; }
        .modal-sparkles span:nth-child(6) { left: 90%; top: 50%; animation-delay: 2s; }

        @keyframes sparkleFloat {
            0%, 100% { opacity: 0.3; transform: translateY(0) scale(1); }
            50% { opacity: 1; transform: translateY(-8px) scale(1.5); }
        }

        .wizard-img {
            width: 160px;
            height: 160px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            object-fit: cover;
            object-position: top;
            border: 2px solid rgba(160, 120, 255, 0.4);
            filter: drop-shadow(0 0 20px rgba(160, 120, 255, 0.5));
        }

        .modal h2 {
            font-size: 1.3rem;
            font-weight: 400;
            color: rgba(220, 200, 255, 0.95);
            margin-bottom: 1.2rem;
            letter-spacing: 0.05em;
        }

        .modal input {
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(160, 120, 255, 0.3);
            background: rgba(20, 15, 50, 0.8);
            color: #e0d8ff;
            text-align: center;
            letter-spacing: 0.1em;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .modal input:focus {
            border-color: rgba(160, 120, 255, 0.7);
            box-shadow: 0 0 20px rgba(120, 80, 220, 0.3);
        }

        .modal input.wrong {
            border-color: rgba(255, 80, 80, 0.6);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .modal-hint {
            font-size: 0.8rem;
            color: rgba(180, 160, 220, 0.5);
            margin-top: 0.8rem;
            font-style: italic;
        }

        .modal-close {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            background: none;
            border: none;
            color: rgba(180, 160, 220, 0.5);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }

        .modal-close:hover {
            color: rgba(220, 200, 255, 0.9);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="stars"><canvas id="stars"></canvas></div>
    <div class="content">
        <h1>tmcn.us</h1>
        <p class="tagline">building the future, one <a href="#" id="game-link" style="color: rgba(200, 180, 255, 0.9); text-decoration: none; border-bottom: 1px solid rgba(200, 180, 255, 0.4); transition: color 0.2s, border-color 0.2s;">line</a> at a time</p>
    </div>
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-sparkles">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            <img class="wizard-img" src="/images/merlin.jpg" alt="Merlin the Wizard" />
            <h2>First, say the magic word...</h2>
            <input type="password" id="magic-input" placeholder="speak, friend..." autocomplete="off" />
            <p class="modal-hint">the wizard awaits your incantation</p>
        </div>
    </div>

    <script>
        // Magic word modal
        document.getElementById('game-link').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('modal').classList.add('active');
            document.getElementById('magic-input').value = '';
            document.getElementById('magic-input').classList.remove('wrong');
            setTimeout(() => document.getElementById('magic-input').focus(), 100);
        });

        document.getElementById('magic-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (this.value.trim().toLowerCase() === 'please wish') {
                    document.getElementById('modal').classList.remove('active');
                    sessionStorage.setItem('magic', btoa(Date.now().toString()));
                    window.location.href = '/apps/';
                } else {
                    this.classList.add('wrong');
                    setTimeout(() => this.classList.remove('wrong'), 400);
                }
            }
        });

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, particles;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = Array.from({ length: 120 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.5 + 0.3,
                dx: (Math.random() - 0.5) * 0.15,
                dy: (Math.random() - 0.5) * 0.15,
                opacity: Math.random() * 0.6 + 0.2,
                pulse: Math.random() * Math.PI * 2,
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                p.x += p.dx;
                p.y += p.dy;
                p.pulse += 0.008;
                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;
                const o = p.opacity + Math.sin(p.pulse) * 0.15;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 220, 255, ${o})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        init();
        draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
