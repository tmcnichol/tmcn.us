<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tmcn.us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(20, 60, 120, 0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 40, 180, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(0, 180, 220, 0.3) 0%, transparent 50%),
                linear-gradient(160deg, #0a0a1a 0%, #0d1b2a 40%, #1b1040 100%);
            z-index: 0;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .stars canvas {
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #e0e0ff 0%, #a0c4ff 50%, #c0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: rgba(180, 200, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="stars"><canvas id="stars"></canvas></div>
    <div class="content">
        <h1>tmcn.us</h1>
        <p class="tagline">building the future, one line at a time</p>
    </div>
    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h, particles;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = Array.from({ length: 120 }, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.5 + 0.3,
                dx: (Math.random() - 0.5) * 0.15,
                dy: (Math.random() - 0.5) * 0.15,
                opacity: Math.random() * 0.6 + 0.2,
                pulse: Math.random() * Math.PI * 2,
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            for (const p of particles) {
                p.x += p.dx;
                p.y += p.dy;
                p.pulse += 0.008;
                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;
                const o = p.opacity + Math.sin(p.pulse) * 0.15;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 220, 255, ${o})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        init();
        draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
